name: Aictrl Review

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: aictrl-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Aictrl AI Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    env:
      PR_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
      IS_MANUAL: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Relevant Changes
        id: check_changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$PR_NUMBER" ]; then
            BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
            PR_NUMBER=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
            if [ -z "$PR_NUMBER" ]; then
              echo "No PR found for branch $BRANCH. Skipping."
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Found PR #$PR_NUMBER for branch $BRANCH"
            echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV
          fi

          echo "Checking if SHA $PR_SHA was already reviewed..."
          REVIEW_COMMENTS=$(gh pr view "$PR_NUMBER" --json comments --jq '.comments[].body' | grep -c "Reviewed SHA:" || true)
          LAST_REVIEW_SHA=$(gh pr view "$PR_NUMBER" --json comments --jq '.comments[].body' | grep -o "Reviewed SHA: [a-f0-9]\{40\}" | tail -n 1 | cut -d' ' -f3)

          if [ "$LAST_REVIEW_SHA" == "$PR_SHA" ]; then
            echo "This commit ($PR_SHA) has already been reviewed. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$REVIEW_COMMENTS" -ge 2 ] && [ "$IS_MANUAL" != "true" ]; then
            echo "PR already has $REVIEW_COMMENTS AI reviews. Skipping (use workflow_dispatch to force)."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Checking changed files..."
          CODE_CHANGES=$(git diff --name-only "origin/$PR_BASE_REF...$PR_SHA" | grep -E '\.(ts|js|json|sh|yml|yaml)$' | grep -vE '^docs/|.*\.md$' || true)

          if [ -z "$CODE_CHANGES" ]; then
            echo "No actual code changes detected. Skipping review."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Actual code changes detected:"
            echo "$CODE_CHANGES"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.check_changes.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Aictrl CLI
        if: steps.check_changes.outputs.skip != 'true'
        run: |
          mkdir -p "$RUNNER_TEMP/aictrl"
          cd "$RUNNER_TEMP/aictrl"
          npm init -y > /dev/null 2>&1
          npm install @aictrl/cli@latest
          echo "$RUNNER_TEMP/aictrl/node_modules/.bin" >> $GITHUB_PATH

      - name: Configure Review Permissions
        if: steps.check_changes.outputs.skip != 'true'
        run: |
          # Allow the reviewer agent to read files and run gh commands
          cat > opencode.json << 'PERM_EOF'
          {
            "permission": {
              "read": "allow",
              "bash": {
                "gh *": "allow",
                "git diff *": "allow",
                "git log *": "allow",
                "git show *": "allow",
                "wc *": "allow",
                "cat *": "allow",
                "*": "deny"
              },
              "glob": "allow",
              "grep": "allow",
              "list": "allow"
            }
          }
          PERM_EOF

      - name: Run Aictrl Review
        if: steps.check_changes.outputs.skip != 'true'
        timeout-minutes: 15
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          REVIEW_PR_NUMBER: ${{ env.PR_NUMBER }}
          REVIEW_PR_SHA: ${{ env.PR_SHA }}
          REVIEW_PR_BASE: ${{ env.PR_BASE_REF }}
          REVIEW_REPO: ${{ github.repository }}
        run: |
          echo "Starting review for PR #$PR_NUMBER (SHA $PR_SHA)..."
          aictrl run --format json --model zai-coding-plan/glm-5 \
            "You are reviewing PR #$REVIEW_PR_NUMBER on $REVIEW_REPO (SHA: $REVIEW_PR_SHA, base: $REVIEW_PR_BASE). You have access to the full repository checkout, gh CLI, and git. Use these tools to understand the changes — do NOT ask for the diff to be provided. Steps: 1) Run gh pr view $REVIEW_PR_NUMBER to get PR description. 2) Run gh pr diff $REVIEW_PR_NUMBER to see the changes. 3) Read any source files you need for context. 4) Focus on bugs, security issues, logic errors, and reliability. Skip style nits. 5) Post your review as a single comment: gh pr comment $REVIEW_PR_NUMBER --repo $REVIEW_REPO --body '<review>'. End with 'Reviewed SHA: $REVIEW_PR_SHA'."

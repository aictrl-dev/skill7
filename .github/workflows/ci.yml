name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure git
        run: |
          git config --global user.email "bulat@aictrl.dev"
          git config --global user.name "Aictrl CI"

      - name: Build
        run: bun turbo build
        env:
          AICTRL_BUILD_SINGLE: "true"

      - name: Typecheck
        run: bun run typecheck

      - name: Run Tests
        run: bun turbo test --concurrency=100%

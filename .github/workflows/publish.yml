name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install

      - name: Build Packages
        env:
          AICTRL_VERSION: ${{ github.event.release.tag_name }}
        run: |
          export AICTRL_VERSION="${AICTRL_VERSION#v}"
          bun turbo build

      - name: Publish @aictrl/util
        working-directory: packages/util
        run: bun pm pack && npm publish *.tgz --access public --provenance || true

      - name: Publish @aictrl/plugin
        working-directory: packages/plugin
        run: bun pm pack && npm publish *.tgz --access public --provenance || true

      - name: Publish @aictrl/sdk
        working-directory: packages/sdk
        run: bun pm pack && npm publish *.tgz --access public --provenance || true

      - name: Publish @aictrl/cli-linux-x64
        working-directory: packages/cli/dist/@aictrl/cli-linux-x64
        run: npm publish --access public --provenance || true

      - name: Strip bundled deps from CLI package.json
        working-directory: packages/cli
        run: |
          # All dependencies are bundled into the compiled binary.
          # Only optionalDependencies (platform binaries) are needed at install time.
          node -e "
            const pkg = require('./package.json');
            delete pkg.dependencies;
            delete pkg.devDependencies;
            delete pkg.peerDependencies;
            delete pkg.peerDependenciesMeta;
            delete pkg.overrides;
            delete pkg.exports;
            delete pkg.type;
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish @aictrl/cli
        working-directory: packages/cli
        run: bun pm pack && npm publish *.tgz --access public --provenance

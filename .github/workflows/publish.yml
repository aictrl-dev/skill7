name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Upgrade npm to 11.10.1 for OIDC trusted publishing
        # OIDC trusted publishing (auto-auth via GitHub Actions id-token) is
        # supported from npm >= 11.5.0, so the runner's bundled npm (10.9.x)
        # is too old and must be upgraded.
        #
        # Must be pinned below 11.11.0. In 11.11.0 (npm/cli#9008) the
        # `promise-retry` dep was replaced with `@gar/promise-retry`, and
        # installing that version over the runner's bundled 10.9.x tree
        # leaves orphaned arborist files still `require('promise-retry')`,
        # producing MODULE_NOT_FOUND and silently breaking every release
        # since v0.3.1. Pinning to 11.10.1 (last version with `promise-retry`)
        # avoids the removal boundary entirely.
        #
        # Corepack's `--activate` was tried (0837d45) but left the on-PATH
        # npm at the runner's bundled 10.9.7, so OIDC auth never engaged
        # and every publish failed with ENEEDAUTH.
        run: |
          npm install -g npm@11.10.1
          npm --version

      - name: Install dependencies
        run: bun install

      - name: Build Packages
        env:
          AICTRL_VERSION: ${{ github.event.release.tag_name }}
        run: |
          export AICTRL_VERSION="${AICTRL_VERSION#v}"
          bun turbo build

      - name: Publish @aictrl/util
        working-directory: packages/util
        run: |
          # Pack, then publish the resulting tarball. We tolerate ONLY the
          # "version already published" error (EPUBLISHCONFLICT / E409 /
          # "cannot publish over" / "already published") so reruns after a
          # partial failure still succeed. Every other error - ENEEDAUTH,
          # network, etc - must fail loud. See issue #51 for the v0.3.1 /
          # v0.3.2 silent-failure post-mortem that motivated this wrapper.
          rm -f *.tgz
          bun pm pack
          tarball=$(ls -1 *.tgz 2>/dev/null | head -n1)
          if [ -z "$tarball" ]; then
            echo "::error::bun pm pack produced no .tgz files in $(pwd)"
            exit 1
          fi
          set +e
          output=$(npm publish "$tarball" --access public --provenance 2>&1)
          code=$?
          set -e
          echo "$output"
          if [ $code -ne 0 ]; then
            if echo "$output" | grep -qE 'EPUBLISHCONFLICT|E409|cannot publish over|already published'; then
              echo "::notice::Tolerating 'already published' error for @aictrl/util"
            else
              exit $code
            fi
          fi

      - name: Publish @aictrl/plugin
        working-directory: packages/plugin
        run: |
          # See @aictrl/util step for wrapper rationale (issue #51).
          rm -f *.tgz
          bun pm pack
          tarball=$(ls -1 *.tgz 2>/dev/null | head -n1)
          if [ -z "$tarball" ]; then
            echo "::error::bun pm pack produced no .tgz files in $(pwd)"
            exit 1
          fi
          set +e
          output=$(npm publish "$tarball" --access public --provenance 2>&1)
          code=$?
          set -e
          echo "$output"
          if [ $code -ne 0 ]; then
            if echo "$output" | grep -qE 'EPUBLISHCONFLICT|E409|cannot publish over|already published'; then
              echo "::notice::Tolerating 'already published' error for @aictrl/plugin"
            else
              exit $code
            fi
          fi

      - name: Publish @aictrl/sdk
        working-directory: packages/sdk
        run: |
          # See @aictrl/util step for wrapper rationale (issue #51).
          rm -f *.tgz
          bun pm pack
          tarball=$(ls -1 *.tgz 2>/dev/null | head -n1)
          if [ -z "$tarball" ]; then
            echo "::error::bun pm pack produced no .tgz files in $(pwd)"
            exit 1
          fi
          set +e
          output=$(npm publish "$tarball" --access public --provenance 2>&1)
          code=$?
          set -e
          echo "$output"
          if [ $code -ne 0 ]; then
            if echo "$output" | grep -qE 'EPUBLISHCONFLICT|E409|cannot publish over|already published'; then
              echo "::notice::Tolerating 'already published' error for @aictrl/sdk"
            else
              exit $code
            fi
          fi

      - name: Publish platform binary packages
        working-directory: packages/cli/dist/@aictrl
        run: |
          # Publish every @aictrl/cli-<platform>-<arch>[-variant] package that
          # the build step produced. Each directory contains a generated
          # package.json stamped with the release version. Individual
          # "already published" errors are tolerated (for reruns), but every
          # other failure - ENEEDAUTH, network, etc - fails loud. See #51.
          shopt -s nullglob
          dirs=(*/)
          if [ ${#dirs[@]} -eq 0 ]; then
            echo "::error::No platform binary package directories found in $(pwd)"
            exit 1
          fi
          for dir in "${dirs[@]}"; do
            name="${dir%/}"
            echo "Publishing ${name}"
            set +e
            output=$(cd "$dir" && npm publish --access public --provenance 2>&1)
            code=$?
            set -e
            echo "$output"
            if [ $code -ne 0 ]; then
              if echo "$output" | grep -qE 'EPUBLISHCONFLICT|E409|cannot publish over|already published'; then
                echo "::notice::Tolerating 'already published' error for ${name}"
              else
                exit $code
              fi
            fi
          done

      - name: Strip bundled deps and refresh platform binary optionalDependencies
        working-directory: packages/cli
        run: |
          # All bundleable dependencies are compiled into the native binary, so
          # the published package only needs:
          #   - platform binary packages (regenerated below from dist/ to match
          #     the release version — otherwise stale pins ship the wrong binary)
          #   - genuine runtime optionals like @parcel/watcher and bun-pty that
          #     must be resolved at install time against the host platform
          node -e "
            const fs = require('fs');
            const path = require('path');
            const pkg = require('./package.json');
            delete pkg.dependencies;
            delete pkg.devDependencies;
            delete pkg.peerDependencies;
            delete pkg.peerDependenciesMeta;
            delete pkg.overrides;
            delete pkg.exports;
            delete pkg.type;

            // Preserve non-platform-binary optionals (real runtime deps);
            // drop any @aictrl/cli-* entries so we can repopulate from dist/.
            const preserved = {};
            for (const [name, version] of Object.entries(pkg.optionalDependencies || {})) {
              if (!name.startsWith('@aictrl/cli-')) preserved[name] = version;
            }

            const distDir = path.join('dist', '@aictrl');
            const platformDeps = {};
            for (const entry of fs.readdirSync(distDir, { withFileTypes: true })) {
              if (!entry.isDirectory()) continue;
              const manifestPath = path.join(distDir, entry.name, 'package.json');
              if (!fs.existsSync(manifestPath)) continue;
              const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
              // Only accept packages that match the platform binary naming
              // shape (@aictrl/cli-<linux|darwin|windows>-<arch>...). This
              // guards against any non-binary subdirectory that may end up
              // alongside them (e.g. the @aictrl/cli-ai wrapper that the
              // legacy script/publish.ts creates) leaking into
              // optionalDependencies.
              if (typeof manifest.name !== 'string' || !/^@aictrl\/cli-(linux|darwin|windows)(-[a-z0-9]+)+$/.test(manifest.name)) {
                continue;
              }
              platformDeps[manifest.name] = manifest.version;
            }
            if (Object.keys(platformDeps).length === 0) {
              throw new Error('No platform binary packages found in ' + distDir);
            }

            pkg.optionalDependencies = { ...preserved, ...platformDeps };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('optionalDependencies:', pkg.optionalDependencies);
          "

      - name: Publish @aictrl/cli
        working-directory: packages/cli
        run: |
          # See @aictrl/util step for wrapper rationale (issue #51).
          rm -f *.tgz
          bun pm pack
          tarball=$(ls -1 *.tgz 2>/dev/null | head -n1)
          if [ -z "$tarball" ]; then
            echo "::error::bun pm pack produced no .tgz files in $(pwd)"
            exit 1
          fi
          set +e
          output=$(npm publish "$tarball" --access public --provenance 2>&1)
          code=$?
          set -e
          echo "$output"
          if [ $code -ne 0 ]; then
            if echo "$output" | grep -qE 'EPUBLISHCONFLICT|E409|cannot publish over|already published'; then
              echo "::notice::Tolerating 'already published' error for @aictrl/cli"
            else
              exit $code
            fi
          fi

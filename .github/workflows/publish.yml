name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Packages
        run: bun turbo build

      - name: Setup npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish @aictrl/script
        run: bun publish --access public
        working-directory: packages/script

      - name: Publish @aictrl/util
        run: bun publish --access public
        working-directory: packages/util

      - name: Publish @aictrl/plugin
        run: bun publish --access public
        working-directory: packages/plugin

      - name: Publish @aictrl/sdk
        run: bun publish --access public
        working-directory: packages/sdk

      - name: Publish @aictrl/cli
        run: bun publish --access public
        working-directory: packages/cli

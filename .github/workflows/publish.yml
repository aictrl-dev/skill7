name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Packages
        run: bun turbo build

      - name: Publish @aictrl/util
        run: npx npm publish --access public --provenance
        working-directory: packages/util

      - name: Publish @aictrl/plugin
        run: npx npm publish --access public --provenance
        working-directory: packages/plugin

      - name: Publish @aictrl/sdk
        run: npx npm publish --access public --provenance
        working-directory: packages/sdk

      - name: Publish @aictrl/cli-linux-x64
        run: npx npm publish --access public --provenance
        working-directory: packages/cli/dist/@aictrl/cli-linux-x64

      - name: Publish @aictrl/cli
        run: npx npm publish --access public --provenance
        working-directory: packages/cli
